<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レート別シェアバランス ダッシュボード</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="dataUpdatedBadge" class="data-updated-badge">更新データ: --</div>
  <section id="accessGate" class="access-gate">
    <div class="access-card panel">
      <p class="header-kicker">Share Dashboard</p>
      <h1>閲覧パスワード</h1>
      <p class="access-text">閲覧するにはパスワードを入力してください。</p>
      <div class="access-form">
        <input id="accessPasswordInput" type="password" placeholder="パスワード">
        <button id="accessUnlockButton" class="button primary" type="button">開く</button>
      </div>
      <p id="accessError" class="access-error hidden">パスワードが違います。</p>
    </div>
  </section>
  <div class="page-shell">
    <header class="page-header panel">
      <div class="header-title">
        <p class="header-kicker">Share Dashboard</p>
        <h1 id="dashboardTitle">店舗別・年月別シェア一覧</h1>
      </div>
      <div class="header-controls">
        <div class="control control-nav">
          <span>店舗選択</span>
          <div class="nav-select-wrap">
            <button id="storePrevButton" class="nav-button" type="button" aria-label="前の店舗">＜</button>
            <select id="storeSelect"></select>
            <button id="storeNextButton" class="nav-button" type="button" aria-label="次の店舗">＞</button>
          </div>
        </div>
        <label class="control">
          <span>レート</span>
          <select id="rateSelect"></select>
        </label>
        <label class="control">
          <span>表示項目</span>
          <select id="metricSelect">
            <option value="all">全表示</option>
            <option value="count">台数</option>
            <option value="seatShare">台数シェア</option>
            <option value="salesShare">売上シェア</option>
            <option value="profitShare">補粗利シェア</option>
          </select>
        </label>
        <div class="control control-period">
          <span>表示期間</span>
          <button id="periodTrigger" class="period-trigger" type="button">全期間</button>
        </div>
        <div class="control control-export">
          <span>出力</span>
          <div class="export-buttons">
            <button id="exportPdfButton" class="button ghost" type="button">PDF出力</button>
            <button id="exportExcelButton" class="button secondary" type="button">Excel出力</button>
          </div>
        </div>
      </div>
    </header>

    <section id="periodPanel" class="panel period-panel hidden">
      <div class="period-panel-body">
        <div class="period-year-column">
          <div class="period-year-head">
            <button id="periodStartYearPrev" class="period-year-nav" type="button" aria-label="開始年の前年">＜</button>
            <div id="periodStartYearLabel" class="period-year-label">2025年</div>
            <button id="periodStartYearNext" class="period-year-nav" type="button" aria-label="開始年の翌年">＞</button>
          </div>
          <div id="periodStartMonths" class="period-month-grid"></div>
        </div>
        <div class="period-year-column">
          <div class="period-year-head">
            <button id="periodEndYearPrev" class="period-year-nav" type="button" aria-label="終了年の前年">＜</button>
            <div id="periodEndYearLabel" class="period-year-label">2026年</div>
            <button id="periodEndYearNext" class="period-year-nav" type="button" aria-label="終了年の翌年">＞</button>
          </div>
          <div id="periodEndMonths" class="period-month-grid"></div>
        </div>
        <div class="period-side">
          <div class="period-preview">
            <span>期間</span>
            <strong id="periodPreviewText">全期間</strong>
          </div>
          <div class="period-actions">
            <button id="periodClearButton" class="button ghost" type="button">全期間</button>
            <button id="periodApplyButton" class="button primary" type="button">検索実行</button>
          </div>
        </div>
      </div>
    </section>

    <section id="importPanel" class="panel import-panel hidden">
      <div class="section-head">データ読込設定</div>
      <div class="import-grid">
        <label class="control">
          <span>パスワード</span>
          <input id="passwordInput" type="password" placeholder="パスワードを入力">
        </label>
        <label class="control">
          <span>反映月</span>
          <select id="importMonthSelect"></select>
        </label>
        <label class="control import-file">
          <span>アップロード</span>
          <input id="fileInput" type="file" accept=".zip,.csv,.json" disabled>
        </label>
      </div>
      <div class="import-actions">
        <button id="clearSavedDataButton" class="button ghost" type="button">保存データをクリア</button>
      </div>
      <p id="importStatus" class="import-status">ZIP / CSV / JSON を選択すると読込します。</p>
    </section>

    <section id="emptyState" class="empty-state panel hidden">
      <div class="empty-illustration" aria-hidden="true">
        <div class="empty-bar"></div>
        <div class="empty-bar empty-bar-short"></div>
        <div class="empty-box"></div>
      </div>
      <h2>表示できるデータがありません</h2>
      <p>CSV または JSON を読み込むと一覧を表示できます。</p>
      <button id="emptyOpenImportButton" class="button primary empty-button" type="button">データ読込</button>
    </section>

    <main id="dashboard" class="dashboard hidden">
      <section class="panel">
        <div class="section-head">店舗別・年月別シェア一覧</div>
        <div class="matrix-legend">
          <span><i class="legend-chip legend-high"></i>緑: グループ内で相対的に高い</span>
          <span><i class="legend-chip legend-low"></i>赤: グループ内で相対的に低い</span>
        </div>
        <div class="table-wrap">
          <table class="matrix-table">
            <thead id="matrixHead"></thead>
            <tbody id="trendCards"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="selectionActionBar" class="selection-action-bar hidden">
    <div class="selection-action-buttons">
      <button id="selectionShowOnlyButton" class="button primary" type="button">選択店舗のみ表示</button>
      <button id="selectionClearButton" class="button ghost" type="button">選択解除</button>
    </div>
  </div>

  <script src="./data/dashboard-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="./app.js"></script>
  <script>
    window.exportCurrentPdfView = async function () {
      if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
        window.alert("PDF出力ライブラリを読み込めませんでした");
        return;
      }

      const sourcePanel = document.querySelector("#dashboard .panel");
      if (!sourcePanel) {
        window.alert("PDF出力できるデータがありません");
        return;
      }

      const exportRoot = document.createElement("div");
      exportRoot.style.position = "fixed";
      exportRoot.style.left = "-20000px";
      exportRoot.style.top = "0";
      exportRoot.style.background = "#ffffff";
      exportRoot.style.padding = "12px 16px";
      exportRoot.style.color = "#1f2937";
      exportRoot.style.fontFamily = "\"BIZ UDPGothic\", \"Yu Gothic UI\", Meiryo, sans-serif";
      exportRoot.style.width = "1600px";

      const title = document.createElement("div");
      title.style.fontSize = "20px";
      title.style.fontWeight = "700";
      title.style.marginBottom = "8px";
      title.textContent = "店舗別・年月別シェア一覧";
      exportRoot.appendChild(title);

      const selectedStoresLabel = document.querySelector("#storeSelect")?.value || "全店舗";
      const selectedRateLabel = document.querySelector("#rateSelect")?.value || "全レート";
      const selectedMetricLabel = document.querySelector("#metricSelect")?.selectedOptions?.[0]?.textContent || "";
      const sub = document.createElement("div");
      sub.style.fontSize = "12px";
      sub.style.color = "#6b7280";
      sub.style.marginBottom = "12px";
      sub.textContent = `店舗: ${selectedStoresLabel}  レート: ${selectedRateLabel}  表示項目: ${selectedMetricLabel}`;
      exportRoot.appendChild(sub);

      const clonedTableWrap = sourcePanel.querySelector(".table-wrap").cloneNode(true);
      clonedTableWrap.style.overflow = "visible";
      clonedTableWrap.style.maxWidth = "none";
      clonedTableWrap.querySelectorAll("button, input").forEach((el) => {
        if (el.tagName === "BUTTON") {
          const span = document.createElement("span");
          span.textContent = el.textContent.replace(/[▲▼]/g, "").trim();
          el.replaceWith(span);
        } else {
          el.remove();
        }
      });
      clonedTableWrap.querySelectorAll(".store-select-row").forEach((rowEl) => {
        rowEl.style.display = "inline-flex";
        rowEl.style.alignItems = "center";
        rowEl.style.gap = "0";
      });
      clonedTableWrap.querySelectorAll(".store-link-button").forEach((el) => {
        el.style.border = "none";
        el.style.background = "transparent";
        el.style.padding = "0";
        el.style.color = "#1f2937";
        el.style.fontWeight = "400";
      });
      exportRoot.appendChild(clonedTableWrap);
      document.body.appendChild(exportRoot);
      try {
        const canvas = await window.html2canvas(exportRoot, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff"
        });

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const margin = 8;
        const imgWidth = pageWidth - margin * 2;
        const imgHeight = canvas.height * imgWidth / canvas.width;
        const totalPages = Math.max(1, Math.ceil(imgHeight / (pageHeight - margin * 2)));
        const imgData = canvas.toDataURL("image/jpeg", 0.98);

        for (let page = 0; page < totalPages; page += 1) {
          if (page > 0) doc.addPage();
          const y = margin - page * (pageHeight - margin * 2);
          doc.addImage(imgData, "JPEG", margin, y, imgWidth, imgHeight);
        }

        const fileNameBase = `share-dashboard_${selectedStoresLabel}_${selectedRateLabel}_${selectedMetricLabel || "PDF"}`.replace(/[\\/:*?"<>|]/g, "_");
        doc.save(`${fileNameBase}.pdf`);
      } finally {
        exportRoot.remove();
      }
    };
  </script>
</body>
<script>
  window.exportCurrentPdfView = async function () {
    if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
      window.alert("PDF出力ライブラリを読み込めませんでした");
      return;
    }

    const sourcePanel = document.querySelector("#dashboard .panel");
    const tableWrap = sourcePanel?.querySelector(".table-wrap");
    if (!sourcePanel || !tableWrap) {
      window.alert("PDF出力できる表示データがありません");
      return;
    }

    const selectedStoreLabel = document.querySelector("#storeSelect")?.selectedOptions?.[0]?.textContent?.trim() || "全店舗";
    const selectedRateLabel = document.querySelector("#rateSelect")?.selectedOptions?.[0]?.textContent?.trim() || "全レート";
    const selectedMetricLabel = document.querySelector("#metricSelect")?.selectedOptions?.[0]?.textContent?.trim() || "全表示";

    const exportRoot = document.createElement("div");
    exportRoot.style.position = "fixed";
    exportRoot.style.left = "-20000px";
    exportRoot.style.top = "0";
    exportRoot.style.zIndex = "-1";
    exportRoot.style.background = "#ffffff";
    exportRoot.style.padding = "12px 16px";
    exportRoot.style.color = "#1f2937";
    exportRoot.style.fontFamily = "\"BIZ UDPGothic\", \"Yu Gothic UI\", Meiryo, sans-serif";
    exportRoot.style.width = "1600px";
    exportRoot.style.boxSizing = "border-box";

    const title = document.createElement("div");
    title.style.fontSize = "20px";
    title.style.fontWeight = "700";
    title.style.marginBottom = "8px";
    title.textContent = "店舗別・年月別シェア一覧";
    exportRoot.appendChild(title);

    const sub = document.createElement("div");
    sub.style.fontSize = "12px";
    sub.style.color = "#6b7280";
    sub.style.marginBottom = "12px";
    sub.textContent = `店舗: ${selectedStoreLabel}  レート: ${selectedRateLabel}  表示項目: ${selectedMetricLabel}`;
    exportRoot.appendChild(sub);

    const clonedTableWrap = tableWrap.cloneNode(true);
    clonedTableWrap.style.overflow = "visible";
    clonedTableWrap.style.maxWidth = "none";
    clonedTableWrap.style.width = "auto";
    clonedTableWrap.querySelectorAll("button, input").forEach((el) => {
      if (el.tagName === "BUTTON") {
        const span = document.createElement("span");
        span.textContent = el.textContent.replace(/[<>]/g, "").trim();
        span.style.color = "#1f2937";
        span.style.fontWeight = "400";
        el.replaceWith(span);
      } else {
        el.remove();
      }
    });
    clonedTableWrap.querySelectorAll(".store-select-row").forEach((rowEl) => {
      rowEl.style.display = "inline-flex";
      rowEl.style.alignItems = "center";
      rowEl.style.gap = "0";
    });
    clonedTableWrap.querySelectorAll(".store-link-button").forEach((el) => {
      el.style.border = "none";
      el.style.background = "transparent";
      el.style.padding = "0";
      el.style.color = "#1f2937";
      el.style.fontWeight = "400";
    });

    exportRoot.appendChild(clonedTableWrap);
    document.body.appendChild(exportRoot);

    try {
      const canvas = await window.html2canvas(exportRoot, {
        scale: 2,
        useCORS: true,
        backgroundColor: "#ffffff",
        logging: false
      });

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 8;
      const usableWidth = pageWidth - margin * 2;
      const usableHeight = pageHeight - margin * 2;
      const imageHeight = canvas.height * usableWidth / canvas.width;
      const pageCount = Math.max(1, Math.ceil(imageHeight / usableHeight));
      const imgData = canvas.toDataURL("image/jpeg", 0.98);

      for (let pageIndex = 0; pageIndex < pageCount; pageIndex += 1) {
        if (pageIndex > 0) doc.addPage();
        const y = margin - (pageIndex * usableHeight);
        doc.addImage(imgData, "JPEG", margin, y, usableWidth, imageHeight);
      }

      const fileNameBase = `share-dashboard_${selectedStoreLabel}_${selectedRateLabel}_${selectedMetricLabel}`.replace(/[\\/:*?"<>|]/g, "_");
      doc.save(`${fileNameBase}.pdf`);
    } catch (error) {
      console.error(error);
      window.alert("PDF出力に失敗しました");
    } finally {
      exportRoot.remove();
    }
  };
</script>
<script>
  window.exportCurrentPdfView = async function () {
    if (!window.html2canvas || !window.jspdf || !window.jspdf.jsPDF) {
      window.alert("PDF export library is not available.");
      return;
    }

    const sourcePanel = document.querySelector("#dashboard .panel");
    const tableWrap = sourcePanel && sourcePanel.querySelector(".table-wrap");
    if (!sourcePanel || !tableWrap) {
      window.alert("No visible table data to export.");
      return;
    }

    const storeSelect = document.querySelector("#storeSelect");
    const rateSelect = document.querySelector("#rateSelect");
    const metricSelect = document.querySelector("#metricSelect");
    const selectedStoreLabel = storeSelect && storeSelect.selectedOptions[0] ? storeSelect.selectedOptions[0].textContent.trim() : "all-stores";
    const selectedRateLabel = rateSelect && rateSelect.selectedOptions[0] ? rateSelect.selectedOptions[0].textContent.trim() : "all-rates";
    const selectedMetricLabel = metricSelect && metricSelect.selectedOptions[0] ? metricSelect.selectedOptions[0].textContent.trim() : "all";

    const exportRoot = document.createElement("div");
    exportRoot.style.position = "fixed";
    exportRoot.style.left = "-20000px";
    exportRoot.style.top = "0";
    exportRoot.style.zIndex = "-1";
    exportRoot.style.background = "#ffffff";
    exportRoot.style.padding = "12px 16px";
    exportRoot.style.color = "#1f2937";
    exportRoot.style.fontFamily = "\"BIZ UDPGothic\", \"Yu Gothic UI\", Meiryo, sans-serif";
    exportRoot.style.width = "1600px";
    exportRoot.style.boxSizing = "border-box";

    const title = document.createElement("div");
    title.style.fontSize = "20px";
    title.style.fontWeight = "700";
    title.style.marginBottom = "8px";
    title.textContent = "Share Dashboard";
    exportRoot.appendChild(title);

    const sub = document.createElement("div");
    sub.style.fontSize = "12px";
    sub.style.color = "#6b7280";
    sub.style.marginBottom = "12px";
    sub.textContent = "Store: " + selectedStoreLabel + "  Rate: " + selectedRateLabel + "  Metric: " + selectedMetricLabel;
    exportRoot.appendChild(sub);

    const clonedTableWrap = tableWrap.cloneNode(true);
    clonedTableWrap.style.overflow = "visible";
    clonedTableWrap.style.maxWidth = "none";
    clonedTableWrap.style.width = "auto";
    clonedTableWrap.querySelectorAll("button, input").forEach(function (el) {
      if (el.tagName === "BUTTON") {
        const span = document.createElement("span");
        span.textContent = el.textContent.replace(/[<>]/g, "").trim();
        span.style.color = "#1f2937";
        span.style.fontWeight = "400";
        el.replaceWith(span);
      } else {
        el.remove();
      }
    });
    clonedTableWrap.querySelectorAll(".store-select-row").forEach(function (rowEl) {
      rowEl.style.display = "inline-flex";
      rowEl.style.alignItems = "center";
      rowEl.style.gap = "0";
    });
    clonedTableWrap.querySelectorAll(".store-link-button").forEach(function (el) {
      el.style.border = "none";
      el.style.background = "transparent";
      el.style.padding = "0";
      el.style.color = "#1f2937";
      el.style.fontWeight = "400";
    });

    exportRoot.appendChild(clonedTableWrap);
    document.body.appendChild(exportRoot);

    try {
      const canvas = await window.html2canvas(exportRoot, {
        scale: 2,
        useCORS: true,
        backgroundColor: "#ffffff",
        logging: false
      });

      const jsPDF = window.jspdf.jsPDF;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 8;
      const usableWidth = pageWidth - margin * 2;
      const usableHeight = pageHeight - margin * 2;
      const imageHeight = canvas.height * usableWidth / canvas.width;
      const pageCount = Math.max(1, Math.ceil(imageHeight / usableHeight));
      const imgData = canvas.toDataURL("image/jpeg", 0.98);

      for (let pageIndex = 0; pageIndex < pageCount; pageIndex += 1) {
        if (pageIndex > 0) doc.addPage();
        const y = margin - (pageIndex * usableHeight);
        doc.addImage(imgData, "JPEG", margin, y, usableWidth, imageHeight);
      }

      const fileNameBase = ("share-dashboard_" + selectedStoreLabel + "_" + selectedRateLabel + "_" + selectedMetricLabel).replace(/[\\/:*?"<>|]/g, "_");
      doc.save(fileNameBase + ".pdf");
    } catch (error) {
      console.error(error);
      window.alert("PDF export failed.");
    } finally {
      exportRoot.remove();
    }
  };
</script>
</html>
